<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Landing Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    
    nav {
      background: #10a37f;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    nav h1 { color: white; font-size: 1.5rem; }
    
    nav ul {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    
    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }
    
    nav a:hover { text-decoration: underline; }
    
    section {
      min-height: 100vh;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    #home {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    
    #home h2 { font-size: 3rem; margin-bottom: 1rem; }
    #home p { font-size: 1.2rem; margin-bottom: 2rem; }
    
    .btn {
      background: #10a37f;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn:hover { background: #0d8c6a; }
    
    #about { background: #f7f7f8; }
    #contact { background: #fff; }
    
    h2 { font-size: 2.5rem; margin-bottom: 1rem; }
    p { font-size: 1.1rem; max-width: 600px; text-align: center; }
    
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    
    input, textarea {
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1rem;
    }
    
    textarea { min-height: 120px; resize: vertical; }
  </style>
</head>
<body>
  <nav>
    <h1>ChatGPT</h1>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="home">
    <h2>Welcome to ChatGPT</h2>
    <p>Your AI-powered conversational assistant</p>
    <a href="#about" class="btn">Get Started</a>
  </section>

  <section id="about">
    <h2>About ChatGPT</h2>
    <p>ChatGPT is an advanced AI language model that can help you with writing, coding, learning, and much more. Experience the power of conversational AI.</p>
  </section>

  <section id="contact">
    <h2>Contact Us</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>
</body>
</html>
